services:
  back:
    build:
      context: ./back
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  front:
    build:
      context: ./front
    ports:
      - '3000:3000'
      - '80:3000'    # also serve on port 80 so browsers with a cached
                     # redirect to http://localhost/host/ still land correctly
    depends_on:
      back:
        condition: service_healthy

  docs:
    build:
      context: ./docs-site
    ports:
      - '3002:80'
