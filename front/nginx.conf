server {
    # Listen on 3000 to match the Docker host-port mapping (3000:3000).
    # If nginx listened on 80 with a 3000:80 mapping, any absolute redirect
    # URL would omit the port (http://localhost/host/) instead of correctly
    # referencing http://localhost:3000/host/ — causing browsers to cache a
    # broken redirect that points to port 80.
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Emit relative Location headers so Docker's 3000:80 port mapping is preserved.
    # Without this, nginx's trailing-slash 301s use port 80 (the internal port),
    # stripping :3000 and sending browsers to http://localhost/host/ instead of
    # http://localhost:3000/host/.
    absolute_redirect off;

    # Docker internal DNS resolver.
    resolver 127.0.0.11 valid=10s;

    # Proxy WebSocket + HTTP Socket.IO traffic to the backend container.
    # Front only starts after back passes its healthcheck (service_healthy),
    # so `back` is guaranteed to be resolvable at nginx startup.
    location /socket.io/ {
        proxy_pass http://back:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback: serve index.html for all unknown routes (/host, /play, …)
    # Use $uri/index.html instead of $uri/ to avoid nginx's trailing-slash 301
    # redirect, which gets misrouted to port 80 by Rancher Desktop / Docker's
    # port mapping layer.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
