server {
    # Listen on 4321 inside the container (Docker maps host port 4321:4321).
    # This matches the Astro dev server port (Mode A), giving both modes the same URL.
    #
    # absolute_redirect off keeps Location headers relative (e.g. /host/ instead of
    # http://localhost:4321/host/), which is safer for SPA routing.
    absolute_redirect off;

    listen 4321;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all unknown routes (/host, /play, …)
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
