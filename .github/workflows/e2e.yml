name: E2E tests (Docker)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - cloudflare-migration

jobs:
  e2e:
    name: Run E2E against docker-compose stack
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules (root)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Prepare partykit.json (inject KV ID)
        if: ${{ secrets.CF_HOSTS_NAMESPACE_ID != '' }}
        run: |
          cp partykit.json.template partykit.json
          node -e "let fs=require('fs');let p='partykit.json';let c=fs.readFileSync(p,'utf8');c=c.replace('PASTE_NAMESPACE_ID_HERE', process.env.CF_HOSTS_NAMESPACE_ID);fs.writeFileSync(p,c);"
        env:
          CF_HOSTS_NAMESPACE_ID: ${{ secrets.CF_HOSTS_NAMESPACE_ID }}

      - name: Deploy PartyKit to Cloudflare
        if: ${{ secrets.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Use npx partykit deploy; ensure auth token is available via CF_API_TOKEN
          npm ci
          npx partykit deploy

      - name: Build docs for /docs (production parity)
        working-directory: ./docs-site
        run: |
          npm ci
          npm run build:local

      - name: Start Docker stack (compose)
        run: |
          docker-compose --profile full up --build -d

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:4321/ >/dev/null; then echo "frontend up" && break; fi
            echo "waiting for frontend... ($i)"; sleep 2;
          done

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./e2e
        run: |
          npm test -- --reporter=dot

      - name: Tear down docker stack
        if: always()
        run: |
          docker-compose --profile full down
