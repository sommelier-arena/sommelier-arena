name: Tests

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (front)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix front ci

      - name: Run unit tests
        run: npm --prefix front test -- --reporter=verbose

  e2e-tests:
    name: E2E Tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build and start the full Docker stack (back + front + docs)
      - name: Build Docker stack
        run: docker compose build

      - name: Start Docker stack
        run: docker compose up -d

      # Wait for front (port 4321) and back (port 1999) to become healthy
      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:4321/ > /dev/null 2>&1; then
              echo "Frontend is up after ${i} attempts"
              break
            fi
            echo "Waiting for frontend... attempt $i/60"
            sleep 3
          done
          curl -sSf http://localhost:4321/ || (echo "Frontend never became ready" && exit 1)

      - name: Wait for PartyKit backend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:1999/ > /dev/null 2>&1; then
              echo "Backend is up after ${i} attempts"
              break
            fi
            echo "Waiting for backend... attempt $i/60"
            sleep 3
          done
          curl -sSf http://localhost:1999/ || (echo "Backend never became ready" && exit 1)

      - name: Install Playwright + browsers
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests (Chromium only)
        working-directory: ./e2e
        run: npx playwright test --project=chromium --reporter=dot

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker stack
        if: always()
        run: docker compose down
