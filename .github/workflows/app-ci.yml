name: App CI (E2E & Deploy)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - cloudflare-migration

jobs:
  app:
    name: App: E2E & Deploy
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules (root)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Start Docker stack (compose)
        run: |
          docker-compose --profile full up --build -d

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:4321/ >/dev/null; then echo "frontend up" && break; fi
            echo "waiting for frontend... ($i)"; sleep 2;
          done

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright E2E tests
        working-directory: ./e2e
        run: |
          npm test -- --reporter=dot

      # If E2E tests pass, proceed to deployment steps. If tests fail the job will stop here and deployment won't run.

      - name: Prepare partykit.json (inject KV ID)
        if: ${{ secrets.CF_HOSTS_NAMESPACE_ID != '' }}
        run: |
          cp partykit.json.template partykit.json
          node -e "let fs=require('fs');let p='partykit.json';let c=fs.readFileSync(p,'utf8');c=c.replace('PASTE_NAMESPACE_ID_HERE', process.env.CF_HOSTS_NAMESPACE_ID);fs.writeFileSync(p,c);"
        env:
          CF_HOSTS_NAMESPACE_ID: ${{ secrets.CF_HOSTS_NAMESPACE_ID }}

      - name: Deploy PartyKit to Cloudflare (if token)
        if: ${{ secrets.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm ci
          npx partykit deploy

      - name: Publish proxy worker via Wrangler
        if: ${{ secrets.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler publish proxy-worker/index.ts --name sommelier-arena-proxy

      - name: Tear down docker stack
        if: always()
        run: |
          # Tear down the docker-compose stack to free resources. This runs even if earlier steps fail.
          docker-compose --profile full down
