name: App CI (E2E & Deploy)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  app:
    name: App: E2E & Deploy
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules (root)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Start Docker stack (compose)
        run: |
          docker-compose up --build -d

      - name: Wait for frontend to be ready
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:4321/ >/dev/null; then echo "frontend up" && break; fi
            echo "waiting for frontend... ($i)"; sleep 2;
          done

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright E2E tests
        working-directory: ./e2e
        run: |
          npm test -- --reporter=dot

      # If E2E tests pass, proceed to deployment steps. If tests fail the job will stop here and deployment won't run.

      - name: Inject CF_HOSTS_NAMESPACE_ID into partykit.json
        if: ${{ secrets.CF_HOSTS_NAMESPACE_ID != '' }}
        env:
          CF_HOSTS_NAMESPACE_ID: ${{ secrets.CF_HOSTS_NAMESPACE_ID }}
        run: |
          if [ -f partykit.json ]; then
            node -e "const fs=require('fs');const p='partykit.json';let c=fs.readFileSync(p,'utf8');c=c.replace(/PASTE_NAMESPACE_ID_HERE/g, process.env.CF_HOSTS_NAMESPACE_ID);fs.writeFileSync(p,c);"
          else
            echo 'partykit.json not found in repo root'; exit 1
          fi

      - name: Deploy PartyKit to Cloudflare (if token)
        if: ${{ secrets.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm ci
          set -euo pipefail
          PARTYKIT_OUTPUT=$(npx partykit deploy 2>&1)
          echo "$PARTYKIT_OUTPUT"
          PARTYKIT_URL=$(echo "$PARTYKIT_OUTPUT" | grep -Eo 'https?://[^ ]+partykit.dev' | head -n1 || true)
          if [ -n "$PARTYKIT_URL" ]; then
            HOSTNAME=${PARTYKIT_URL#https://}
            echo "PUBLIC_PARTYKIT_HOST=$HOSTNAME" >> $GITHUB_ENV
            echo "Captured PUBLIC_PARTYKIT_HOST=$HOSTNAME"
          else
            echo "Warning: PARTYKIT_URL not found in partykit deploy output"
          fi

      - name: Build frontend and publish to Pages (if configured)
        if: ${{ secrets.CF_API_TOKEN != '' && secrets.CF_PAGES_PROJECT_NAME != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "PUBLIC_PARTYKIT_HOST=$PUBLIC_PARTYKIT_HOST"
          npm --prefix front ci
          # Build frontend with the captured PUBLIC_PARTYKIT_HOST available as env var
          PUBLIC_PARTYKIT_HOST=$PUBLIC_PARTYKIT_HOST npm --prefix front run build
          # Publish the built static site to Cloudflare Pages using wrangler
          npx wrangler pages publish front/dist --project-name ${{ secrets.CF_PAGES_PROJECT_NAME }} --branch main

      - name: Publish proxy worker via Wrangler
        if: ${{ secrets.CF_API_TOKEN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler publish proxy-worker/index.ts --name sommelier-arena-proxy

      - name: Tear down docker stack
        if: always()
        run: |
          # Tear down the docker-compose stack to free resources. This runs even if earlier steps fail.
          docker-compose down
