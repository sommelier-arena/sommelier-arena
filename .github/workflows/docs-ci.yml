name: Docs CI

on:
  push:
    branches: [ main ]
    paths:
      - 'docs-site/**'
  pull_request:
    paths:
      - 'docs-site/**'

jobs:
  build-docs:
    name: Build & validate docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build docs
        working-directory: ./docs-site
        run: |
          npm ci
          npm run build:local

      - name: Check search index files
        run: |
          ls -al docs-site/build/search-index-*

      - name: Upload docs build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs-site/build
