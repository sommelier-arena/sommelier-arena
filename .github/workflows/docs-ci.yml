name: Docs CI

on:
  push:
    branches: [ main, cloudflare-migration ]
    paths:
      - 'docs-site/**'
  pull_request:
    paths:
      - 'docs-site/**'

jobs:
  build-docs:
    name: Build & validate docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare partykit.json (inject KV ID)
        if: ${{ secrets.CF_HOSTS_NAMESPACE_ID != '' }}
        run: |
          cp partykit.json.template partykit.json
          node -e "let fs=require('fs');let p='partykit.json';let c=fs.readFileSync(p,'utf8');c=c.replace('PASTE_NAMESPACE_ID_HERE', process.env.CF_HOSTS_NAMESPACE_ID);fs.writeFileSync(p,c);"
        env:
          CF_HOSTS_NAMESPACE_ID: ${{ secrets.CF_HOSTS_NAMESPACE_ID }}

      - name: Install and build docs
        working-directory: ./docs-site
        run: |
          npm ci
          npm run build:local

      - name: Check search index files
        run: |
          ls -al docs-site/build/search-index-*

      - name: Upload docs build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs-site/build
